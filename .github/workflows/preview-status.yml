name: Preview Status

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview-status:
    name: Dokploy Preview
    runs-on: ubuntu-latest
    steps:
      - name: Wait for preview deployment
        uses: actions/github-script@v7
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}
        with:
          script: |
            const PR = context.payload.pull_request.number;
            const API = `${process.env.DOKPLOY_URL}/api`;
            const headers = { "x-api-key": process.env.DOKPLOY_TOKEN };
            const appId = process.env.DOKPLOY_APP_ID;

            if (!process.env.DOKPLOY_URL || !headers["x-api-key"] || !appId) {
              core.warning("Missing DOKPLOY_URL, DOKPLOY_TOKEN, or DOKPLOY_APP_ID secrets");
              return;
            }

            const maxAttempts = 30;
            const interval = 15_000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              await new Promise((r) => setTimeout(r, interval));

              try {
                const res = await fetch(`${API}/previewDeployment.all?applicationId=${appId}`, { headers });
                if (!res.ok) {
                  core.warning(`Attempt ${attempt}/${maxAttempts}: API returned ${res.status}`);
                  continue;
                }

                const previews = await res.json();
                if (!Array.isArray(previews)) {
                  core.warning(`Attempt ${attempt}/${maxAttempts}: unexpected response format`);
                  continue;
                }

                const preview = previews.find(
                  (p) => String(p.pullRequestNumber) === String(PR)
                );

                if (!preview) {
                  core.info(`Attempt ${attempt}/${maxAttempts}: no preview for PR #${PR} yet`);
                  continue;
                }

                const status = preview.previewStatus;
                core.info(`Attempt ${attempt}/${maxAttempts}: status=${status}`);

                if (status === "done") return;
                if (status === "error") {
                  core.setFailed("Preview deployment failed");
                  return;
                }
              } catch (err) {
                core.warning(`Attempt ${attempt}/${maxAttempts}: ${err.message}`);
              }
            }

            core.setFailed("Preview deployment timed out after 7.5 minutes");
